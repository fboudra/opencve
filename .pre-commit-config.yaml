  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: gitleaks

  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.3.0
    hooks:
      - id: betterleaks
        name: betterleaks

  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: detect hardcoded secrets
        entry: bash -c 'trufflehog git file://. --since-commit HEAD --results=verified,unknown --fail --trust-local-git-config --no-update'
        language: system
        stages: ["pre-commit", "pre-push"]

  - repo: https://github.com/thoughtworks/talisman
    rev: v1.37.0
    hooks:
      - id: talisman-commit

  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args: ["--ignore", "DL3008", "--ignore", "DL3013", "--ignore", "DL3018", "--ignore", "DL3041"]

# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
