  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - "tomli==2.4.1"
        exclude: |
          (?x)^(
            uv.lock|
            scheduler/airflow.cfg.example|
            web/tests/data/kb/2021/.*|
            web/tests/data/serialized_cves/.*|
            web/static/css/.*|
            web/static/js/.*|
            web/cves/.*|
            web/cves/templates/cves/includes/.*|
            web/static/fonts/.*|
            web/tests/cves/.*|
          )$

